<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>帮助中心</title></head>
<body style="font-family:sans-serif;padding:20px;">
    <h1>📖 帮助中心</h1>
    <h2>常见问题</h2>
    <h3>1. 如何注册？</h3>
    <p>点击导航栏"注册"链接，填写用户名、密码、邮箱和手机号即可。</p>
    <h3>2. 如何搜索用户？</h3>
    <p>登录后在首页搜索框输入用户名或邮箱即可搜索。</p>
    <h3>3. 如何充值？</h3>
    <p>在个人中心输入金额提交充值申请，等待管理员审批。</p>
    <h3>4. 如何上传头像？</h3>
    <p>点击导航栏"上传头像"，选择图片文件上传即可（支持PNG/JPG/GIF/WebP）。</p>
    <h3>5. 忘记密码怎么办？</h3>
    <p>请联系管理员重置密码。</p>
</body>
</html>
