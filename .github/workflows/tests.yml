name: 安全测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}

      - run: sudo apt-get update && sudo apt-get install -y libmagic1 sqlite3
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: 启动应用
        env:
          SECRET_KEY: ci-secret-key-for-testing-abcdef123456
          ADMIN_PASSWORD: Ci@Strong#Admin789
          ALICE_PASSWORD: Ci@Strong#Alice789
          REDIS_URL: redis://localhost:6379/0
        run: gunicorn wsgi:app --bind 127.0.0.1:5000 & sleep 3

      - name: 安全测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_security.py

      - name: 上传安全测试
        run: python tests/test_upload_security.py

      - name: 业务逻辑测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_business_logic.py

      - name: 迁移测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_migrations.py

      - name: 并发审批测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_concurrent_approval.py

      - name: 密码轮换测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_password_rotation.py

      - name: 注册验证测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_registration_validation.py

      - name: Session撤销测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_session_revocation.py

      - name: CSRF集成测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_csrf_integration.py

      - name: 页面安全测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_page_security.py

      - name: SSRF 安全测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_ssrf.py

      - name: 命令注入安全测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_command_injection.py

      - name: XXE 安全测试
        env: {SECRET_KEY: ci-secret-key-for-testing-abcdef123456, ADMIN_PASSWORD: Ci@Strong#Admin789, ALICE_PASSWORD: Ci@Strong#Alice789, REDIS_URL: redis://localhost:6379/0}
        run: python tests/test_xxe.py
