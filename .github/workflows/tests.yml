name: 安全测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 启动应用
        env:
          SECRET_KEY: ci-secret-key-for-testing-abcdef123456
          ADMIN_PASSWORD: Ci@Strong#Admin789
          ALICE_PASSWORD: Ci@Strong#Alice789
          REDIS_URL: redis://localhost:6379/0
        run: |
          gunicorn wsgi:app --bind 127.0.0.1:5000 &
          sleep 3

      - name: 运行安全测试
        env:
          SECRET_KEY: ci-secret-key-for-testing-abcdef123456
          ADMIN_PASSWORD: Ci@Strong#Admin789
          ALICE_PASSWORD: Ci@Strong#Alice789
          REDIS_URL: redis://localhost:6379/0
        run: |
          python tests/test_security.py
