{% extends "base.html" %}

{% block content %}
<div class="card upload-card">
    <h2>上传头像</h2>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">上传成功！</div>
    <div class="upload-preview">
        <h3>图片预览</h3>
        <img src="{{ file_url }}" alt="头像预览" class="preview-img">
        <p>文件链接：<a href="{{ file_url }}" target="_blank">{{ file_url }}</a></p>
    </div>
    <div style="margin-top: 20px;">
        <a href="/upload" class="btn btn-primary">继续上传</a>
        <a href="/" class="btn" style="background:#ccc;color:#333;margin-left:8px;">返回首页</a>
    </div>
    {% else %}
    <form method="POST" action="/upload" enctype="multipart/form-data" class="upload-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="file">选择头像文件</label>
            <input type="file" id="file" name="file" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">上传</button>
    </form>
    {% endif %}
</div>
{% endblock %}
