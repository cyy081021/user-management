{% extends "base.html" %}

{% block content %}
<div class="card profile-card">
    <h2>个人中心</h2>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if user %}
    <div class="user-info">
        <h3>用户资料</h3>
        <table class="info-table">
            <tr>
                <td class="info-label">ID</td>
                <td class="info-value">{{ user.id }}</td>
            </tr>
            <tr>
                <td class="info-label">用户名</td>
                <td class="info-value">{{ user.username }}</td>
            </tr>
            <tr>
                <td class="info-label">邮箱</td>
                <td class="info-value">{{ user.email }}</td>
            </tr>
            <tr>
                <td class="info-label">手机</td>
                <td class="info-value">{{ user.phone }}</td>
            </tr>
            <tr>
                <td class="info-label">余额</td>
                <td class="info-value">¥{{ "%.2f"|format(user.balance) }}</td>
            </tr>
        </table>
    </div>

    <div class="recharge-section">
        <h3>充值</h3>
        <form method="POST" action="/recharge" class="recharge-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">

            <div class="form-group">
                <label for="amount">充值金额</label>
                <input type="text" id="amount" name="amount" placeholder="输入金额" required>
            </div>
            <button type="submit" class="btn btn-primary">充值</button>
        </form>
    </div>

    <a href="/" class="btn" style="background:#ccc;color:#333;margin-top:16px;">返回首页</a>
    {% endif %}
</div>
{% endblock %}
