<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/">用户管理系统</a>
        </div>
        <div class="navbar-menu">
            {% if session.get("user_id") %}
            <span class="navbar-welcome">欢迎，{{ session.get("username") }}</span>
            <a href="{{ url_for('main.upload') }}" class="navbar-link">上传头像</a>
            <a href="{{ url_for('main.profile') }}" class="navbar-link">个人中心</a>
            <a href="{{ url_for('main.ping') }}" class="navbar-link">Ping测试</a>
            <form method="POST" action="{{ url_for('main.logout') }}" style="display:inline;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="navbar-link" style="background:none;border:none;cursor:pointer;color:#fff;font-size:14px;padding:6px 14px;">退出</button>
            </form>
            {% else %}
            <a href="{{ url_for('main.login') }}" class="navbar-link">登录</a>
            <a href="{{ url_for('main.register') }}" class="navbar-link">注册</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
